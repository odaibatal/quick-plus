  <main class="py-5 min-vh-100 d-flex align-items-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-5">
          <!-- العنوان -->
          <div class="text-center mb-4 animate-in">
            <div class="d-inline-flex align-items-center justify-content-center rounded-4 mb-3" style="width: 48px; height: 48px; background: linear-gradient(135deg, #f59e0b, #d97706);">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <rect x="4" y="2" width="16" height="20" rx="2"/>
                <line x1="8" y1="6" x2="16" y2="6"/>
              </svg>
            </div>
            <h1 class="h3 fw-bold">الحاسبة</h1>
          </div>

          <!-- السجل -->
          <div class="mb-3" id="history"></div>

          <!-- الحاسبة -->
          <div class="card custom-card overflow-hidden animate-in-delay-1">
            <!-- الشاشة -->
            <div class="calc-display p-4">
              <div class="text-muted small mb-1" id="expression" style="font-family: 'IBM Plex Mono', monospace; height: 16px; overflow: hidden;"></div>
              <div class="fw-bold" id="display" style="font-family: 'IBM Plex Mono', monospace; font-size: 2.5rem; line-height: 1;">0</div>
            </div>

            <!-- الأزرار -->
            <div class="p-3 bg-light-subtle">
              <div class="row g-2">
                <div class="col-3"><button class="calc-btn calc-btn-special w-100" data-action="clear">C</button></div>
                <div class="col-3"><button class="calc-btn calc-btn-special w-100" data-action="negate">+/-</button></div>
                <div class="col-3"><button class="calc-btn calc-btn-special w-100" data-action="percent">%</button></div>
                <div class="col-3"><button class="calc-btn calc-btn-operator w-100" data-value="/">÷</button></div>
                
                <div class="col-3"><button class="calc-btn calc-btn-number w-100" data-value="7">7</button></div>
                <div class="col-3"><button class="calc-btn calc-btn-number w-100" data-value="8">8</button></div>
                <div class="col-3"><button class="calc-btn calc-btn-number w-100" data-value="9">9</button></div>
                <div class="col-3"><button class="calc-btn calc-btn-operator w-100" data-value="*">×</button></div>
                
                <div class="col-3"><button class="calc-btn calc-btn-number w-100" data-value="4">4</button></div>
                <div class="col-3"><button class="calc-btn calc-btn-number w-100" data-value="5">5</button></div>
                <div class="col-3"><button class="calc-btn calc-btn-number w-100" data-value="6">6</button></div>
                <div class="col-3"><button class="calc-btn calc-btn-operator w-100" data-value="-">−</button></div>
                
                <div class="col-3"><button class="calc-btn calc-btn-number w-100" data-value="1">1</button></div>
                <div class="col-3"><button class="calc-btn calc-btn-number w-100" data-value="2">2</button></div>
                <div class="col-3"><button class="calc-btn calc-btn-number w-100" data-value="3">3</button></div>
                <div class="col-3"><button class="calc-btn calc-btn-operator w-100" data-value="+">+</button></div>
                
                <div class="col-6"><button class="calc-btn calc-btn-number w-100" data-value="0">0</button></div>
                <div class="col-3"><button class="calc-btn calc-btn-number w-100" data-value=".">.</button></div>
                <div class="col-3"><button class="calc-btn calc-btn-equals w-100" data-action="equals">=</button></div>
              </div>
              
              <!-- زر المسح -->
              <button class="btn btn-outline-secondary w-100 mt-3 d-flex align-items-center justify-content-center gap-2" id="backspaceBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
                  <line x1="18" y1="9" x2="12" y2="15"/>
                  <line x1="12" y1="9" x2="18" y2="15"/>
                </svg>
                مسح
              </button>
            </div>
          </div>

          <p class="text-center text-muted small mt-4">تتعامل مع القسمة على صفر والتعبيرات غير الصالحة.</p>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    // منطق الحاسبة
    let display = '0';
    let expression = '';
    let justEvaluated = false;
    const displayEl = document.getElementById('display');
    const expressionEl = document.getElementById('expression');
    const historyEl = document.getElementById('history');

    function updateDisplay() {
      const isError = display.startsWith('Error');
      displayEl.textContent = display;
      displayEl.style.color = isError ? '#ef4444' : '';
      displayEl.style.fontSize = display.length > 10 ? '1.5rem' : display.length > 7 ? '2rem' : '2.5rem';
      expressionEl.textContent = expression;
    }

    function safeEval(expr) {
      if (/\/\s*0(?!\.)/.test(expr)) return 'خطأ: قسمة على صفر';
      if (!/^[\d\s+\-*/().]+$/.test(expr)) return 'خطأ';
      try {
        const result = new Function('return (' + expr + ')')();
        if (!isFinite(result)) return 'خطأ: قسمة على صفر';
        if (isNaN(result)) return 'خطأ';
        return String(parseFloat(result.toFixed(10)));
      } catch {
        return 'خطأ';
      }
    }

    function handleInput(value, action) {
      if (action === 'clear') {
        display = '0';
        expression = '';
        justEvaluated = false;
        updateDisplay();
        return;
      }

      if (action === 'negate') {
        if (display !== '0' && !display.startsWith('Error') && !display.startsWith('خطأ')) {
          display = display.startsWith('-') ? display.slice(1) : '-' + display;
          expression = display;
        }
        updateDisplay();
        return;
      }

      if (action === 'percent') {
        if (!display.startsWith('Error') && !display.startsWith('خطأ')) {
          display = String(parseFloat(display) / 100);
          expression = display;
        }
        updateDisplay();
        return;
      }

      if (action === 'equals') {
        if (!expression || expression === 'Error' || expression === 'خطأ') return;
        const result = safeEval(expression);
        const historyItem = document.createElement('div');
        historyItem.className = 'text-end text-muted small';
        historyItem.style.fontFamily = "'IBM Plex Mono', monospace";
        historyItem.textContent = expression + ' = ' + result;
        historyEl.prepend(historyItem);
        if (historyEl.children.length > 2) historyEl.lastChild.remove();
        display = result;
        expression = (result.startsWith('خطأ') || result.startsWith('Error')) ? '' : result;
        justEvaluated = true;
        updateDisplay();
        return;
      }

      const isOperator = ['+', '-', '*', '/'].includes(value);
      const lastChar = expression.slice(-1);
      const isLastOperator = ['+', '-', '*', '/'].includes(lastChar);

      if (justEvaluated && !isOperator) {
        expression = value;
        display = value;
        justEvaluated = false;
        updateDisplay();
        return;
      }

      if (isOperator && isLastOperator) {
        expression = expression.slice(0, -1) + value;
        display = value;
        justEvaluated = false;
        updateDisplay();
        return;
      }

      if (value === '.' && display.includes('.')) return;

      expression += value;
      display = isOperator ? value : (display === '0' && value !== '.' ? value : display + value);
      justEvaluated = false;
      updateDisplay();
    }

    // نقرات الأزرار
    document.querySelectorAll('.calc-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const value = btn.dataset.value;
        const action = btn.dataset.action;
        handleInput(value, action);
      });
    });

    // زر المسح
    document.getElementById('backspaceBtn').addEventListener('click', () => {
      if (display === '0' || display.startsWith('Error') || display.startsWith('خطأ')) return;
      expression = expression.slice(0, -1) || '';
      display = display.length > 1 ? display.slice(0, -1) : '0';
      if (expression === '') expression = display;
      updateDisplay();
    });

    // دعم لوحة المفاتيح
    document.addEventListener('keydown', (e) => {
      const key = e.key;
      if (/[0-9.]/.test(key)) handleInput(key);
      else if (['+', '-', '*', '/'].includes(key)) handleInput(key);
      else if (key === 'Enter' || key === '=') handleInput(null, 'equals');
      else if (key === 'Escape' || key === 'c' || key === 'C') handleInput(null, 'clear');
      else if (key === 'Backspace') document.getElementById('backspaceBtn').click();
    });
  </script>
</body>
</html>
